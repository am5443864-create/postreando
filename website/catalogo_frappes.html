<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Postreando - Catálogo de Frappés</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <header class="navbar">
      <div class="container nav-content">
        <a href="/index.html" class="logo-link">
          <img src="/logo.png" alt="Postreando Logo" class="logo" />
        </a>
        <nav class="nav-links">
          <a href="/index.html">Inicio</a>
          <a href="/nosotros.html">Nosotros</a>
          <a href="/franquicias.html">Franquicias</a>
          <a href="/especialidades.html" class="active">Especialidades</a>
          <a href="/contacto.html" class="btn-nav">Contacto</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero" style="min-height: 30vh;">
        <div class="hero-bg-image" style="background-image: url('/milkshake.png'); background-position: center; filter: brightness(0.6);"></div>
        <div class="hero-overlay" style="background: rgba(0,136,189,0.4);"></div>
        <div class="container hero-content text-center">
          <div class="hero-text full-width">
            <h1 class="text-white">Catálogo de Frappés</h1>
            <a href="/especialidades.html" class="text-light" style="text-decoration: underline;">&larr; Volver a Especialidades</a>
          </div>
        </div>
      </section>

      <section class="section-padding">
        <div class="container">
          <div class="product-grid">
            <div class="product-card">
              <div class="card-image"><img src="/milkshake.png" alt="Frappe" /></div>
              <div class="card-content">
                <h3>Frappé Extremo Moka</h3>
                <p>Café helado con chocolate, galleta crocante y crema batida.</p>
                <div class="price">$120 MXN</div>
              </div>
            </div>
            <div class="product-card">
              <div class="card-image"><img src="/milkshake.png" alt="Frappe Fresa" style="filter: hue-rotate(-50deg);" /></div>
              <div class="card-content">
                <h3>Frappé Fresada</h3>
                <p>Frappé a base de leche y mermelada natural de fresa.</p>
                <div class="price">$110 MXN</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container footer-content">
        <div class="footer-brand">
          <img src="/logo.png" alt="Postreando Logo" class="footer-logo" />
        </div>
      </div>
    </footer>
    <script type="module" src="/main.js"></script>
  </body>
</html>
